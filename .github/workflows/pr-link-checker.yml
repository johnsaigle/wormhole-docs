# This CI workflow was adapted from (and inspired by) [PaperMoon](https://papermoon.io/)’s MkDocs workflows previously used for Wormhole Docs. 
# Original reference implementation: https://github.com/papermoonio/workflows/blob/main/.github/workflows/core-pr-link-checker.yml

name: PR Docs Link Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev build-essential

      - name: Install pip requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Build Docs
        run: mkdocs build -d site/docs

      - name: Initialize Local Web Server
        id: serve
        shell: bash
        run: |
          python3 -m http.server 8000 --directory site/docs > /tmp/mkdocs_http.log 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"

          echo "Waiting for local server..."
          for i in {1..15}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Server ready."
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start." && exit 1

      - name: Configure Lychee
        id: lychee_cfg
        shell: bash
        run: |
          cat > /tmp/lychee.ci.toml <<'TOML'
          exclude_all_private = false
          exclude_loopback = false
          exclude_private = false
          exclude_link_local = false
          include = [
            '^http://localhost:8000',
            '^http://127\.0\.0\.1:8000'
          ]
          TOML
          echo "cfg=/tmp/lychee.ci.toml" >> "$GITHUB_OUTPUT"

      - name: Generate Link Checker Arguments
        id: lychee_args
        shell: bash
        run: |
          ABS_SITE_PATH="$(pwd)/site"
          LOCAL_SERVER="http://localhost:8000"
          BASE_URL="https://wormhole.com/docs"

          ARGS="--config $LYCHEE_CFG --root-dir $ABS_SITE_PATH --verbose --no-progress --accept 429,403 --max-retries 3 --retry-wait-time 10"
          ARGS="$ARGS --remap \"$BASE_URL/ $LOCAL_SERVER/\" --remap \"$BASE_URL $LOCAL_SERVER\""

          URLIGNORE_PATH="$(pwd)/.urlignore"
          if [[ -f "$URLIGNORE_PATH" ]]; then
            ARGS="$ARGS --exclude-file $URLIGNORE_PATH"
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
        env:
          LYCHEE_CFG: ${{ steps.lychee_cfg.outputs.cfg }}

      - name: Check Links
        id: lychee
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2.4.1
        with:
          args: ${{ steps.lychee_args.outputs.args }} './site/**/*.html'

      - name: Cleanup Local Server
        if: always()
        run: kill $SERVER_PID || true
        env:
          SERVER_PID: ${{ steps.serve.outputs.pid }}
