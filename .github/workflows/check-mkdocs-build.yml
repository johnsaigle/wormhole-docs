name: PR Docs Build

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-docs:
    uses: papermoonio/workflows/.github/workflows/core-pr-mkdocs-build.yml@main
    with:
      mkdocs_repo: papermoonio/wormhole-mkdocs
      docs_repo: wormhole-foundation/wormhole-docs
      docs_checkout: wormhole-docs
      root_dir: /docs
